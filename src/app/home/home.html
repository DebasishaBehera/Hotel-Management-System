<div class="home-container">
  <header class="header">
    <h1>{{ hotelName }}</h1>
    <p>Welcome to comfort, elegance, and premium hospitality.</p>
    <button class="btn-book" [routerLink]="['/rooms']">Book Now</button>
  </header>

  <section class="features">
    <h2>Our Facilities</h2>
    <div class="features-grid">
      <div class="feature-card" *ngFor="let f of features">
        <div class="icon">{{ f.icon }}</div>
        <h3>{{ f.title }}</h3>
        <p>{{ f.desc }}</p>
      </div>
    </div>
  </section>

</div>
